<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externas</title>
    <style>
        @font-face {
            font-family: 'filxgirl';
            src: url('fonts/filxgirl.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
       /*
            Tipos de format()
            -opentype()
            - truetype()
            - embedded-opentype
            - truetype-aat (Apple Advanced Typography)
            - svg
       */

        h1{
            font-family: 'filxgirl', Times, serif;
            font-size: 3em;
        }
    </style>
</head>
<body>
    <h1>Título</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Possimus doloremque, ut asperiores dolore voluptates laudantium minus quidem iusto voluptatibus, nisi aperiam ad, sequi consequatur debitis placeat neque porro dolores optio!</p>
    
</body>
</html>
